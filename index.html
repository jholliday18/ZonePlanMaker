<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canvas Base64 Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/6.0.0/fabric.min.js"></script>
<style>
  body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { border:1px solid black; }
</style>
</head>
<body>
<canvas id="myCanvas" width="400" height="400"></canvas>
<script>
const canvas = new fabric.Canvas('myCanvas');

// Base64 placeholder image (tiny gray square)
const base64Image = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACtWK6eAAAAH0lEQVR4nO3BMQEAAADCoPVPbQ0PoAAAAAAAAAAAALwJk1AAAFIQ5qQAAAABJRU5ErkJggg==";

const img = new Image();
img.onload = function() {
  const fabricImg = new fabric.Image(img, {
    left: 0,
    top: 0,
    selectable: false
  });
  // scale to canvas
  const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
  fabricImg.scale(scale);
  canvas.setBackgroundImage(fabricImg, canvas.renderAll.bind(canvas));
};
img.src = base64Image;
</script>
</body>
</html>
