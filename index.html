<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Canvas Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/6.0.0/fabric.min.js"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    canvas {
      border: 1px solid #000;
    }
  </style>
</head>
<body>
  <canvas id="myCanvas" width="800" height="600"></canvas>

  <script>
    // Initialize Fabric.js canvas
    const canvas = new fabric.Canvas('myCanvas');

    // Load a test image
    fabric.Image.fromURL('https://randomimageurl.com/assets/images/local/20260103_0518_Bold%20Abstract%20Composition_simple_compose_01ke204yvyf6pbx3ksw2cjcgkw_compressed_q80.jpeg', function(img) {
      // Scale the image to fit the canvas
      const scaleX = canvas.width / img.width;
      const scaleY = canvas.height / img.height;
      const scale = Math.min(scaleX, scaleY);
      img.set({
        left: 0,
        top: 0,
        scaleX: scale,
        scaleY: scale
      });

      canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
    });
  </script>
</body>
</html>
